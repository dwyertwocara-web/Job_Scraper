name: Clear Job Data

# Resets ALL scraped job data so you can start fresh — useful when you've
# changed search terms and want to purge old, irrelevant results.
# Clears every per-source JSON the dashboard reads, the rolling accumulator
# (all_jobs.json), and the Pushover dedup tracker (notified.json).
#
# Unlike the scraper workflows, this ALWAYS commits — no ENABLE_DATA_COMMITS
# check. If you triggered this manually, you want the files cleared.
on:
  workflow_dispatch:

concurrency:
  group: job-scraper-commit-push
  cancel-in-progress: false

jobs:
  clear:
    name: Reset all job data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Reset all output JSON files
        run: |
          python - <<'EOF'
          import json, os
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          os.makedirs("output", exist_ok=True)

          # Per-source files (same shape that save_jobs_output() writes)
          source_files = [
              "output/jobs.json",
              "output/linkedin_jobs.json",
              "output/indeed_jobs.json",
              "output/glassdoor_jobs.json",
              "output/ziprecruiter_jobs.json",
              "output/google_jobs.json",
              "output/hiringcafe_jobs.json",
              "output/calcareers_jobs.json",
              "output/usajobs_jobs.json",
              "output/governmentjobs_jobs.json",
              "output/calopps_jobs.json",
          ]
          empty_source = {"scraped_at": now, "total": 0, "new_count": 0, "jobs": [], "new_jobs": []}
          for path in source_files:
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(empty_source, f)
              print(f"✅ {path} cleared")

          # Accumulator (all_jobs.json)
          with open("output/all_jobs.json", "w", encoding="utf-8") as f:
              json.dump({"updated_at": now, "jobs": []}, f)
          print("✅ output/all_jobs.json cleared")

          # Pushover dedup tracker
          with open("output/notified.json", "w", encoding="utf-8") as f:
              json.dump({"ids": []}, f)
          print("✅ output/notified.json cleared")
          EOF

      - name: Commit and push cleared data
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add -f \
            output/all_jobs.json output/notified.json \
            output/jobs.json output/linkedin_jobs.json output/indeed_jobs.json \
            output/glassdoor_jobs.json output/ziprecruiter_jobs.json \
            output/google_jobs.json output/hiringcafe_jobs.json \
            output/calcareers_jobs.json output/usajobs_jobs.json \
            output/governmentjobs_jobs.json output/calopps_jobs.json
          git diff --cached --quiet \
            && echo "Nothing to clear (output already empty)." \
            || git commit -m "chore: clear all job data [$(date -u '+%Y-%m-%d %H:%MZ')]"
          git pull --no-rebase -X ours origin main
          git push
